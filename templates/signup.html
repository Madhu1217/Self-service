{% extends "base.html" %}

{% block title %}Create Account | Self Service Portal{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <p class="eyebrow">New user</p>
        <h1>Create Account</h1>
        <form class="request-form auth-form" method="post">
            <div class="form-field">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" value="{{ request.form.get('username', '') }}" required>
            </div>
            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" value="{{ request.form.get('email', '') }}" required>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" minlength="8" required>
            </div>
            <div class="form-field">
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" minlength="8" required>
            </div>
            <div class="form-actions">
                <a class="button secondary" href="{{ url_for('login') }}">Back To Login</a>
                <button class="button primary" type="submit">Create Account</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
